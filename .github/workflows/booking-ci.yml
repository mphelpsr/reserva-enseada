name: booking CI

on:
  push:
    branches: [main]
    paths:
      - "booking/**"
      - ".github/workflows/booking-ci.yml"
  pull_request:
    paths:
      - "booking/**"
      - ".github/workflows/booking-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    # Runners do GitHub Actions já vêm com Docker — os testes de contrato/integração
    # (T011-T026, incluindo o teste de concorrência T018) usam Testcontainers/DynamoDB
    # Local de verdade aqui, diferente de sandboxes sem acesso a Docker.
    defaults:
      run:
        working-directory: booking
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn verify (unit + contract + integration, T011-T026)
        run: mvn -B verify

      - name: Publicar relatórios de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: booking/target/surefire-reports/
          retention-days: 14
